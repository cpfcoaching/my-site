{{ $img := .image }}
{{ $alt := .alt }}
{{ $class := .class }}

<picture>
    {{ if (strings.HasSuffix $img "png") }}
        {{ $webp := replace $img ".png" ".webp" }}
        {{ if (fileExists (printf "static/%s" $webp)) }}
    <source srcset="{{ $webp | relURL }}" type="image/webp">
        {{ end }}
    {{ end }}
    <img src="{{ $img | relURL }}" 
         alt="{{ $alt }}" 
         class="{{ $class }}"
         loading="lazy"
         decoding="async">
</picture>
